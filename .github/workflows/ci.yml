name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Node.js CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate package.json
        run: |
          node -e 'const p = require("./package.json"); console.log("package.json OK — name:", p.name, "version:", p.version)'

      - name: Validate src/index.js syntax
        run: |
          node --check src/index.js && echo "src/index.js syntax OK"

      - name: Validate src/hive_client.js syntax
        run: |
          node --check src/hive_client.js && echo "src/hive_client.js syntax OK"

      - name: Validate src/mos_adapter.js syntax
        run: |
          node --check src/mos_adapter.js && echo "src/mos_adapter.js syntax OK"

      - name: Validate agent.json
        run: |
          node -e 'const a = require("./agent.json"); console.log("agent.json OK — name:", a.name, "version:", a.version)'
